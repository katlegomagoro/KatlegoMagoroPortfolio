name: Build & Deploy

# Deploy-on-merge model. build runs on every PR open/sync/reopen so failures
# are visible before merge. deploy only runs once a PR has actually merged.
#
# Approval gating (solo-dev setup): GitHub blocks self-approval on PR reviews,
# so branch protection "require approval" would lock the repo's only
# developer out of merging anything. Instead, the manual checkpoint lives on
# the DEPLOY step via GitHub Environments, which does support self-approval —
# develop deploys immediately (it's meant to be safe to break), uat and
# main pause and wait for a manual click in the Actions tab before deploying.
on:
  pull_request:
    branches: [develop, uat, main]
    types: [opened, synchronize, reopened, closed]

env:
  node-version: "20"

jobs:
  build:
    name: "Build"
    if: ${{ github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'reopened' || (github.event.action == 'closed' && github.event.pull_request.merged == true) }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node-version }}
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      # No automated test suite yet — there's no real logic to test at MVP
      # stage (App.tsx is a placeholder render of profile.json). Per
      # ARCHITECTURE.md Section 8.6, automated tests become a requirement
      # starting Iteration 2; a `test` step gets added here when that lands.

      - name: Upload build artifact
        if: ${{ github.event.action == 'closed' && github.event.pull_request.merged == true }}
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: app/dist

  # Dev deploys immediately on merge — no approval gate, matches
  # ARCHITECTURE.md's description of develop as "safe to break."
  deploy-dev:
    name: "Deploy - Dev"
    if: ${{ github.event.action == 'closed' && github.event.pull_request.merged == true && github.base_ref == 'develop' }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Deploy to Cloudflare Pages (Dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=katlegomagoroportfolio --branch=develop

      - name: Verify Dev is reachable
        run: |
          URL="https://develop.katlegomagoroportfolio.pages.dev"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Dev healthy: $URL returned 200"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Dev did not return 200 after 5 attempts"
          exit 1

  # UAT pauses here for manual approval — requires the 'uat' GitHub
  # Environment to exist with you as a required reviewer (see README).
  deploy-uat:
    name: "Deploy - UAT"
    if: ${{ github.event.action == 'closed' && github.event.pull_request.merged == true && github.base_ref == 'uat' }}
    needs: build
    environment: uat
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Deploy to Cloudflare Pages (UAT)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=katlegomagoroportfolio --branch=uat

      - name: Verify UAT is reachable
        run: |
          URL="https://uat.katlegomagoroportfolio.pages.dev"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "UAT healthy: $URL returned 200"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "UAT did not return 200 after 5 attempts"
          exit 1

  # Production pauses here for manual approval — requires the 'production'
  # GitHub Environment to exist with you as a required reviewer.
  deploy-production:
    name: "Deploy - Production"
    if: ${{ github.event.action == 'closed' && github.event.pull_request.merged == true && github.base_ref == 'main' }}
    needs: build
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=katlegomagoroportfolio --branch=main

      - name: Verify Production is reachable
        run: |
          URL="https://katlegomagoroportfolio.pages.dev"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            if [ "$STATUS" = "200" ]; then
              echo "Production healthy: $URL returned 200"
              exit 0
            fi
            echo "Attempt $i: got $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Production did not return 200 after 5 attempts"
          exit 1